# NEW-TOP10 自動化設定檔
# 控制每日執行、手動重訓、PSI 監控等功能

timezone: "Asia/Taipei"

# ========================================
# 執行資源模式
# ========================================
execution:
  resource_profile: "standard" # standard / local_safe / host_full；本機測試可用 env TOP10_RESOURCE_PROFILE=local_safe

# ========================================
# 每日執行設定
# ========================================
daily:
  enabled: true
  run_time: "17:30"          # 每日收盤後執行時間；週末由 daily gate 跳過
  pipeline_lookback_days: 420 # daily ETL 預設 rolling window；保留 250 日指標所需歷史，避免每天三年全量回補
  weekend_enabled: false      # 週末是否執行 (false = 僅工作日)
  max_data_lag_days: 7         # features/events/universe 最新交易日允許落後幾個日曆日
  market_coverage_enabled: true # 最新交易日必須同時覆蓋上市 / 上櫃，避免只抓到單一市場仍誤判新鮮
  required_market_types: ["twse", "tpex"]
  min_latest_market_coverage_ratio: 0.5
  weekly_snapshot_enabled: true # MOM-01：ranking 後產生本週模型初選池 / 每日快照 artifact
  candidate_persistence_enabled: true # PERSIST-01：ranking 後產生入榜天數 / 排名變化 artifact
  daily_report_enabled: true    # DAILY-02：ranking 後產出 PM/使用者可讀的每日決策日報
  market_context_enabled: true  # MARKET-CONTEXT-02：daily decision quality 前產生同日台灣市場背景 artifact
  decision_quality_enabled: true # DECISION-QUALITY-01：彙整入榜天數、replay、portfolio risk、market context；不改 ranking score
  gross55_shadow_monitor_enabled: false # 只產營運 shadow monitor，不改 Top10 / score / Clawd message；預設手動開啟
  gross55_shadow_monitor_batch_enabled: false # 批次彙整近期正式 ranking 的 gross55 降曝險影子樣本；預設手動開啟
  capital_entry_quality_shadow_monitor_enabled: false # CAPITAL-05：入場品質 shadow monitor，不改 Top10 / score / Clawd message；預設手動開啟
  capital_entry_quality_shadow_monitor_batch_enabled: false # 批次彙整近期正式 ranking 的入場品質影子樣本；預設手動開啟
  shadow_historical_evidence_report_enabled: false # 用既有長區間 replay 回答是否只能等待 forward monitor；預設手動開啟
  daily_shadow_status_report_enabled: false # 彙整目前所有 shadow 觀測分支與 review readiness；預設手動開啟
  clawd_payload_enabled: true   # CLAWD-01：daily report 後產出 Clawd-ready payload；不實際發送
  postcheck_enabled: false     # DAILY-03：每日後驗收預設手動執行，避免 launchd 被前端/Chrome 環境卡住
  postcheck_api_enabled: true
  postcheck_frontend_enabled: false

# ========================================
# 模型重訓設定：預設只允許手動觸發，避免未驗證漂移時覆蓋模型
# ========================================
retrain:
  enabled: true
  schedule: "manual"          # manual, weekly, monthly
  time: "02:00"               # 執行時間
  backup_keep_days: 30        # 保留備份天數
  rollback_on_failure: true    # 訓練後驗證、ranking smoke 或 monitor 失敗時回滾舊模型
  baseline_refresh_enabled: true # 新模型驗證通過後刷新與模型 feature 綁定的 PSI baseline
  ranking_smoke_enabled: true  # 新模型完成後先跑 ranking smoke，確認可產出當期 ranking
  monitor_after_train_enabled: true # 新模型完成後跑 PSI / factor / industry monitor
  promotion_gate_enabled: true # auto/scheduled retrain 若 monitor 報警，拒絕 promote 並 rollback
  promotion_gate_block_triggers: ["auto", "scheduled"]
  promotion_gate_block_psi_statuses: ["CRITICAL"]
  promotion_gate_block_factor_statuses: ["WARN"]
  promotion_gate_max_factor_warn_count: 0
  min_feature_count: 50        # 新模型 feature 數低於此值視為異常
  sealed_oos:
    enabled: true              # 正式封閉測試 gate；失敗會 rollback 候選模型
    sealed_trade_days: 60      # 最近已成熟標籤交易日保留為 sealed test，不進訓練/調參/校準
    embargo_trade_days: 10     # sealed 前保留 embargo，避免 horizon 標籤穿越封存期
    min_train_trade_days: 252
    min_sealed_trade_days: 40
    min_sealed_samples: 500
    min_positive_labels: 20
    min_negative_labels: 20
    min_auc: 0.50
    min_top_n_return_uplift: 0.0
    min_top_n_hit_rate_uplift: 0.0
    top_n: 10
    require_model_split_metadata: true
  
  # Optuna 調優參數
  optuna_trials: 20           # 每次重訓的調優次數
  
# ========================================
# PSI 漂移監控設定
# ========================================
monitor:
  enabled: true
  check_days: 30              # 檢查最近幾天的資料
  psi_warning: 0.25           # PSI 警告閾值
  psi_critical: 0.5           # PSI 嚴重閾值
  auto_retrain: false         # 是否在嚴重漂移時自動重訓 (建議 false，手動確認)

# ========================================
# 外部 reference 維護：產業 / 概念股 / ETF 關聯來源
# ========================================
reference:
  enabled: true
  schedule: "monthly"
  day_of_month: 1
  time: "03:30"
  allow_partial: true          # 單一來源失敗時保留其他成功來源與 audit
  
# ========================================
# 通知設定
# ========================================
notify:
  line_enabled: false         # Line Notify 開關
  line_token: ""              # Line Notify Token (若啟用)

  clawd_enabled: false        # Clawd 實際發送開關；CLAWD-01 不會使用它發送
  clawd_channel: "discord"
  clawd_to: "channel:1507327845003825154"
  clawd_dry_run: true
  clawd_cli_node: "/opt/homebrew/opt/node/bin/node"
  clawd_cli_entry: "/Users/mattkuo/new clawd/dist/index.js"
  llm_rewrite_enabled: true  # 推播訊息最後交給免費 LLM 金鑰輪換做操盤手口吻改寫；失敗不阻斷 daily
  llm_rewrite_env_file: "~/.config/ai-core/legacy_review.env"
  llm_rewrite_timeout_seconds: 90
  
  email_enabled: false        # Email 通知開關 (未來功能)
  email_to: ""
  
# ========================================
# 日誌設定
# ========================================
logging:
  level: "INFO"               # DEBUG, INFO, WARNING, ERROR
  keep_days: 90               # 保留日誌天數
  
# ========================================
# 進階設定
# ========================================
advanced:
  parallel_processing: true   # ETL 是否平行處理
  max_workers: 4              # 平行處理 worker 數量
